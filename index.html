<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Animation Studio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .btn-generate {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-generate:disabled {
            background-color: #334155;
            cursor: not-allowed;
        }
        #statusMessage {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        .video-window {
            margin-top: 1.5rem;
            width: 100%;
            display: none;
        }
        video {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Singing Video Studio</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Processes assets through cloud gateways to eliminate payload structural errors.</p>

    <form id="videoForm">
        <div class="input-group">
            <label for="apiKey">Replicate API Token (r8_...)</label>
            <input type="text" id="apiKey" placeholder="r8_..." required>
        </div>

        <div class="input-group">
            <label for="imageInput">Upload Portrait Image (Clear Face)</label>
            <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <div class="input-group">
            <label for="audioInput">Upload Vocal/Music Audio</label>
            <input type="file" id="audioInput" accept="audio/*" required>
        </div>

        <button type="submit" class="btn-generate" id="submitBtn">Generate Singing Video</button>
    </form>

    <div id="statusMessage"></div>
    
    <div class="video-window" id="videoWrapper">
        <video id="outputVideo" controls></video>
    </div>
</div>

<script>
    document.getElementById('videoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const apiKey = document.getElementById('apiKey').value.trim();
        const imageFile = document.getElementById('imageInput').files[0];
        const audioFile = document.getElementById('audioInput').files[0];
        
        const statusMessage = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        const videoWrapper = document.getElementById('videoWrapper');
        const videoPlayer = document.getElementById('outputVideo');

        submitBtn.disabled = true;
        videoWrapper.style.display = 'none';
        statusMessage.style.color = 'var(--text-muted)';
        statusMessage.textContent = "Step 1/3: Transforming image asset to web-link packaging...";

        const toBase64Raw = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });

        try {
            const rawImageBase64 = await toBase64Raw(imageFile);
            const rawAudioBase64 = await toBase64Raw(audioFile);

            // 1. Upload the image to Imgur
            const imgurResponse = await fetch("https://api.imgur.com/3/image", {
                method: "POST",
                headers: {
                    "Authorization": "Client-ID 546c25a59c58ad7",
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ image: rawImageBase64, type: "base64" })
            });

            if (!imgurResponse.ok) {
                throw new Error("Cloud image asset hosting failed. Check internet connection.");
            }
            const imgurData = await imgurResponse.json();
            const secureImageUrl = imgurData.data.link;

            statusMessage.textContent = "Step 2/3: Staging audio file to secure compute storage...";

            // 2. Upload the audio file to a fast, free text hosting bucket to bypass string limit rejections
            const audioUploadResponse = await fetch("https://file.io", {
                method: "POST",
                body: (() => {
                    const formData = new FormData();
                    formData.append("file", audioFile);
                    return formData;
                })()
            });

            if (!audioUploadResponse.ok) {
                throw new Error("Cloud audio staging failed. Try a smaller audio snippet.");
            }
            const audioData = await audioUploadResponse.json();
            const secureAudioUrl = audioData.link;

            statusMessage.textContent = "Step 3/3: Initiating SadTalker AI node cluster pipeline...";

            // 3. Fire the payload links cleanly to Replicate
            const startResponse = await fetch("https://cors-anywhere.herokuapp.com/https://api.replicate.com/v1/predictions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    version: "922c12c5c82d47af2e1f5d485fbc35da5b2d8ab03b7484df7ff3a3e6188b4887",
                    input: {
                        source_image: secureImageUrl,
                        driven_audio: secureAudioUrl, // No more messy data strings!
                        preprocess: "crop",
                        still: false
                    }
                })
            });

            if (startResponse.status === 403) {
                throw new Error("⚠️ PROXY ACCESS EXPIRED: Refresh your authorization window at cors-anywhere.herokuapp.com/corsdemo, click the button, and re-submit.");
            }

            if (!startResponse.ok) {
                const errData = await startResponse.json();
                throw new Error(`Replicate Gateway Error (Status: ${startResponse.status}): ${errData.detail || 'Malformed inputs'}`);
            }

            let prediction = await startResponse.json();
            const predictionId = prediction.id;

            statusMessage.textContent = "🎬 AI cluster is mapping face geometries and voice syncing... (1-2 minutes)";
            
            while (prediction.status !== "succeeded" && prediction.status !== "failed") {
                await new Promise(resolve => setTimeout(resolve, 5000));
                
                const checkResponse = await fetch(`https://cors-anywhere.herokuapp.com/https://api.replicate.com/v1/predictions/${predictionId}`, {
                    headers: { "Authorization": `Bearer ${apiKey}` }
                });
                prediction = await checkResponse.json();
                
                if (prediction.status === "processing") {
                    statusMessage.textContent = "🎬 Core rendering in progress. Constructing audio-driven mouth and face vectors...";
                }
            }

            if (prediction.status === "failed") {
                throw new Error("AI core script rejected animation processing. Ensure your portrait has a clearly visible face.");
            }

            statusMessage.style.color = '#10b981';
            statusMessage.textContent = "🚀 Video Rendered Perfectly! Play your AI singing animation below:";
            videoPlayer.src = prediction.output;
            videoWrapper.style.display = 'block';

        } catch (error) {
            statusMessage.style.color = '#ef4444';
            statusMessage.textContent = error.message;
            console.error(error);
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
