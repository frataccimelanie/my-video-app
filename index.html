<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud AI Video & Music Studio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .btn-generate {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-generate:disabled {
            background-color: #334155;
            cursor: not-allowed;
        }
        #statusMessage {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
        }
        .video-container {
            margin-top: 1.5rem;
            display: none;
            position: relative;
        }
        video {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Cloud AI Video & Music Studio</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Generates video via cloud and syncs your custom audio locally!</p>

    <form id="videoForm">
        <div class="input-group">
            <label for="apiKey">Hugging Face API Key</label>
            <input type="text" id="apiKey" placeholder="paste your hf_... key here" required>
        </div>

        <div class="input-group">
            <label for="imageInput">Upload Source Image</label>
            <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <!-- Audio Input Restored -->
        <div class="input-group">
            <label for="audioInput">Upload Background Music</label>
            <input type="file" id="audioInput" accept="audio/*" required>
        </div>

        <div class="input-group">
            <label for="promptInput">Motion Prompt (What should happen?)</label>
            <input type="text" id="promptInput" placeholder="e.g., cinematic camera zoom, steam rising, waves crashing" required>
        </div>

        <button type="submit" class="btn-generate" id="submitBtn">Generate AI Video</button>
    </form>

    <div id="statusMessage"></div>
    
    <div class="video-container" id="videoWrapper">
        <video id="outputVideo" controls></video>
        <!-- Audio element hidden in background, synced with video playback -->
        <audio id="bgAudio"></audio>
    </div>
</div>

<script>
    const videoPlayer = document.getElementById('outputVideo');
    const audioPlayer = document.getElementById('bgAudio');

    // Sync audio playback to start, pause, and seek with the video
    videoPlayer.addEventListener('play', () => audioPlayer.play());
    videoPlayer.addEventListener('pause', () => audioPlayer.pause());
    videoPlayer.addEventListener('seeking', () => {
        audioPlayer.currentTime = videoPlayer.currentTime;
    });

    document.getElementById('videoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const apiKey = document.getElementById('apiKey').value.trim();
        const imageFile = document.getElementById('imageInput').files[0];
        const audioFile = document.getElementById('audioInput').files[0];
        const prompt = document.getElementById('promptInput').value.trim();
        
        const statusMessage = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        const videoWrapper = document.getElementById('videoWrapper');

        // Reset UI state
        submitBtn.disabled = true;
        videoWrapper.style.display = 'none';
        statusMessage.style.color = 'var(--text-muted)';
        statusMessage.textContent = "Processing image and sending to cloud GPU pipeline...";

        try {
            // 1. Prepare audio file locally
            const audioUrl = URL.createObjectURL(audioFile);
            audioPlayer.src = audioUrl;

            // 2. Convert uploaded image to Base64 for the API
            const base64Image = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(imageFile);
            });

            // 3. Call the serverless Image-to-Video Model
            const response = await fetch("https://api-inference.huggingface.co/models/THUDM/CogVideoX-2b", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: prompt,
                    parameters: {
                        image: base64Image
                    }
                })
            });

            if (!response.ok) {
                throw new Error(`API Error: ${response.statusText}. The cloud model might be warming up, wait a minute and try again!`);
            }

            // 4. Receive the generated silent video
            const videoBlob = await response.blob();
            const videoUrl = URL.createObjectURL(videoBlob);

            // 5. Connect video and show the player
            statusMessage.style.color = '#10b981';
            statusMessage.textContent = "🚀 Video Generated! Press play to watch with your music.";
            videoPlayer.src = videoUrl;
            videoWrapper.style.display = 'block';

        } catch (error) {
            statusMessage.style.color = '#ef4444';
            statusMessage.textContent = error.message;
            console.error(error);
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
