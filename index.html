<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Animation Studio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #6366f1;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            font-family: system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .btn-generate {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-generate:disabled {
            background-color: #334155;
            cursor: not-allowed;
        }
        #statusMessage {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.95rem;
        }
        .video-window {
            margin-top: 1.5rem;
            width: 100%;
            display: none;
        }
        video {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #475569;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Singing Video Studio</h2>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">Animates portraits to talk and sing using Replicate AI cloud clusters.</p>

    <form id="videoForm">
        <div class="input-group">
            <label for="apiKey">Replicate API Token</label>
            <input type="text" id="apiKey" placeholder="r8_..." required>
        </div>

        <div class="input-group">
            <label for="imageInput">Upload Portrait Image (Clear Face)</label>
            <input type="file" id="imageInput" accept="image/*" required>
        </div>

        <div class="input-group">
            <label for="audioInput">Upload Vocal/Music Audio</label>
            <input type="file" id="audioInput" accept="audio/*" required>
        </div>

        <button type="submit" class="btn-generate" id="submitBtn">Generate Singing Video</button>
    </form>

    <div id="statusMessage"></div>
    
    <div class="video-window" id="videoWrapper">
        <video id="outputVideo" controls></video>
    </div>
</div>

<script>
    document.getElementById('videoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const apiKey = document.getElementById('apiKey').value.trim();
        const imageFile = document.getElementById('imageInput').files[0];
        const audioFile = document.getElementById('audioInput').files[0];
        
        const statusMessage = document.getElementById('statusMessage');
        const submitBtn = document.getElementById('submitBtn');
        const videoWrapper = document.getElementById('videoWrapper');
        const videoPlayer = document.getElementById('outputVideo');

        submitBtn.disabled = true;
        videoWrapper.style.display = 'none';
        statusMessage.style.color = 'var(--text-muted)';
        statusMessage.textContent = "Converting files and launching cloud animation processing...";

        // Helper function to turn local files into readable data URLs for the API
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        try {
            const imageBase64 = await toBase64(imageFile);
            const audioBase64 = await toBase64(audioFile);

            statusMessage.textContent = "Uploading files to Replicate GPU servers... (This takes a moment)";

            // 1. Start the prediction model on Replicate (Using SadTalker face animation model)
            // We use a free proxy layer to bypass local browser CORS blocks seamlessly
            const startResponse = await fetch("https://corsproxy.io/?https://api.replicate.com/v1/predictions", {
                method: "POST",
                headers: {
                    "Authorization": `Token ${apiKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    // SadTalker public deployment reference
                    version: "922c12c5c82d47af2e1f5d485fbc35da5b2d8ab03b7484df7ff3a3e6188b4887",
                    input: {
                        source_image: imageBase64,
                        driven_audio: audioBase64,
                        preprocess: "crop", 
                        still: false 
                    }
                })
            });

            if (!startResponse.ok) {
                throw new Error(`Replicate Initiation Error: ${startResponse.statusText}. Check if your token is valid.`);
            }

            let prediction = await startResponse.json();
            const predictionId = prediction.id;

            // 2. Poll the API status loop because video rendering takes time
            statusMessage.textContent = "🎬 AI is physically animating the lips and head movements... (1-2 minutes)";
            
            while (prediction.status !== "succeeded" && prediction.status !== "failed") {
                // Wait 4 seconds between status checks
                await new Promise(resolve => setTimeout(resolve, 4000));
                
                const checkResponse = await fetch(`https://corsproxy.io/?https://api.replicate.com/v1/predictions/${predictionId}`, {
                    headers: { "Authorization": `Token ${apiKey}` }
                });
                prediction = await checkResponse.json();
                
                if (prediction.status === "processing") {
                    statusMessage.textContent = "🎬 Still rendering face meshes on the cloud server...";
                }
            }

            if (prediction.status === "failed") {
                throw new Error("AI Generation failed on the cloud cluster. Try using a smaller audio file.");
            }

            // 3. Output the generated .mp4 file URL straight into our video element
            statusMessage.style.color = '#10b981';
            statusMessage.textContent = "🚀 Video Rendered Perfectly! Play your AI music video below:";
            videoPlayer.src = prediction.output;
            videoWrapper.style.display = 'block';

        } catch (error) {
            statusMessage.style.color = '#ef4444';
            statusMessage.textContent = error.message;
            console.error(error);
        } finally {
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
